<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇬🇧 English Tutor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: #f0f8ff;
        }
        h1 { text-align: center; color: #1e3a8a; }
        #model-select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        #chat-box {
            background: white;
            border-radius: 10px;
            padding: 15px;
            min-height: 250px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }
        .user-msg { color: #2563eb; margin-bottom: 10px; }
        .tutor-msg { color: #16a34a; margin-bottom: 10px; }
        .listen-btn {
            font-size: 14px;
            padding: 5px 10px;
            margin-left: 10px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        button:disabled {
            background: #9ca3af;
        }
        .status { color: #6b7280; text-align: center; margin: 10px 0; }
        #progress-bar {
            width: 100%;
            height: 10px;
            background: #e5e7eb;
            border-radius: 5px;
            margin-top: 5px;
            display: none;
        }
        #progress-fill {
            height: 100%;
            background: #2563eb;
            border-radius: 5px;
            width: 0%;
        }
    </style>
</head>
<body>
    <h1>🇬🇧 English Tutor</h1>
    <select id="model-select">
        <option value="Xenova/llama2.c-stories15M" data-size="15MB">TinyStories (15MB, works 100%)</option>
        <option value="Xenova/opt-125m" data-size="250MB">OPT-125M (250MB)</option>
        <option value="Xenova/Qwen1.5-0.5B-Chat" data-size="500MB">Qwen 0.5B Chat (500MB)</option>
        <option value="Xenova/TinyLlama-1.1B-Chat-v1.0" data-size="600MB">TinyLlama 1.1B (600MB)</option>
        <option value="Xenova/Llama-3.2-1B-Instruct" data-size="600MB">Llama 3.2 1B (600MB)</option>
    </select>
    <div id="chat-box">
        <p class="tutor-msg">Hello! I'm your English partner. Press the button and talk to me. 😊</p>
    </div>
    <p id="status" class="status">Loading...</p>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <button id="speak-btn" disabled>🎤 Press & Speak English</button>

    <script type="module">
        import { pipeline } from './transformers.min.js';

        const chatBox = document.getElementById('chat-box');
        const statusDiv = document.getElementById('status');
        const speakBtn = document.getElementById('speak-btn');
        const modelSelect = document.getElementById('model-select');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');

        let generator = null;
        let isListening = false;
        const FALLBACK_MODEL = 'Xenova/llama2.c-stories15M'; // مدل تضمینی

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        const synth = window.speechSynthesis;

        function speak(text) {
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            u.rate = 0.85;
            synth.speak(u);
        }

        function unlockAudio() {
            const u = new SpeechSynthesisUtterance('');
            u.volume = 0;
            synth.speak(u);
        }

        function addMessage(sender, text, autoSpeak = false) {
            const p = document.createElement('p');
            p.className = sender === 'You' ? 'user-msg' : 'tutor-msg';
            p.innerHTML = `<strong>${sender}:</strong> ${text} `;
            if (sender === 'Tutor') {
                const btn = document.createElement('button');
                btn.className = 'listen-btn';
                btn.textContent = '🔊 Listen';
                btn.addEventListener('click', () => speak(text));
                p.appendChild(btn);
            }
            chatBox.appendChild(p);
            chatBox.scrollTop = chatBox.scrollHeight;
            if (autoSpeak && sender === 'Tutor') speak(text);
        }

        // بارگذاری مدل با fallback
        async function loadModel(modelName) {
            if (generator && generator.model && generator.model.name === modelName) {
                statusDiv.textContent = 'Ready!';
                return;
            }
            generator = null;
            statusDiv.textContent = `Loading ${modelName}...`;
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            speakBtn.disabled = true;

            try {
                const gen = await pipeline('text-generation', modelName, {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            const percent = Math.round((p.loaded / p.total) * 100);
                            progressFill.style.width = percent + '%';
                            statusDiv.textContent = `Downloading: ${percent}%`;
                        }
                    }
                });
                generator = gen;
                statusDiv.textContent = 'Ready! Press and speak.';
                progressBar.style.display = 'none';
                speakBtn.disabled = false;
            } catch (err) {
                console.error(err);
                progressBar.style.display = 'none';
                if (modelName !== FALLBACK_MODEL) {
                    addMessage('System', `Failed to load ${modelName}. Falling back to TinyStories.`);
                    // ریست و تلاش برای مدل کوچک
                    modelSelect.value = FALLBACK_MODEL;
                    return loadModel(FALLBACK_MODEL);
                } else {
                    statusDiv.textContent = 'Critical error. Refresh.';
                    addMessage('System', 'Failed to load fallback model. Please reload.');
                }
            }
        }

        // شروع با مدل پیش‌فرض (TinyStories)
        loadModel(FALLBACK_MODEL);

        modelSelect.addEventListener('change', () => {
            loadModel(modelSelect.value);
        });

        speakBtn.addEventListener('click', () => {
            if (isListening || !generator) return;
            unlockAudio();
            recognition.start();
            isListening = true;
            speakBtn.textContent = '🎧 Listening...';
            statusDiv.textContent = 'Speak now...';
        });

        recognition.addEventListener('result', async (event) => {
            const userText = event.results[0][0].transcript;
            addMessage('You', userText);
            statusDiv.textContent = 'Tutor is thinking...';
            recognition.stop();
            isListening = false;
            speakBtn.textContent = '🎤 Press & Speak English';

            const systemPrompt = `You are a kind English tutor. The user is a beginner. Reply in 1-2 short English sentences. Correct mistakes gently.`;

            // فرمت پرامپت بسته به مدل (برای سادگی از یک فرمت عمومی استفاده می‌کنیم)
            const prompt = `<|system|>\n${systemPrompt}\n</s>\n<|user|>\n${userText}\n</s>\n<|assistant|>`;

            try {
                const output = await generator(prompt, {
                    max_new_tokens: 60,
                    temperature: 0.7,
                    do_sample: true,
                    repetition_penalty: 1.2,
                });
                const generated = output[0].generated_text;
                const reply = generated.split('<|assistant|>').pop().trim();
                addMessage('Tutor', reply, true);
                statusDiv.textContent = 'Ready.';
            } catch (error) {
                addMessage('System', 'Error generating response.', 'tutor-msg');
                statusDiv.textContent = 'Error.';
            }
        });

        recognition.addEventListener('error', (event) => {
            addMessage('System', 'Microphone error: ' + event.error, 'tutor-msg');
            isListening = false;
            speakBtn.textContent = '🎤 Press & Speak English';
        });

        document.addEventListener('click', unlockAudio, { once: true });
    </script>
</body>
</html>
