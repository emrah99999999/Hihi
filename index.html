<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇬🇧 English Tutor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: #f0f8ff;
        }
        h1 { text-align: center; color: #1e3a8a; }
        #model-select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        #chat-box {
            background: white;
            border-radius: 10px;
            padding: 15px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }
        .user-msg { color: #2563eb; margin-bottom: 10px; }
        .ai-msg { color: #16a34a; margin-bottom: 10px; }
        .listen-btn {
            font-size: 14px;
            padding: 5px 10px;
            margin-left: 10px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        button:disabled {
            background: #9ca3af;
        }
        .status { color: #6b7280; text-align: center; margin: 10px 0; }
        #progress-bar {
            width: 100%;
            height: 10px;
            background: #e5e7eb;
            border-radius: 5px;
            margin-top: 5px;
            display: none;
        }
        #progress-fill {
            height: 100%;
            background: #2563eb;
            border-radius: 5px;
            width: 0%;
        }
    </style>
</head>
<body>
    <h1>🇬🇧 English Tutor</h1>
    <select id="model-select">
        <option value="Xenova/llama2.c-stories15M">TinyStories (15MB, instant)</option>
        <option value="Xenova/TinyLlama-1.1B-Chat-v1.0">TinyLlama (600MB, better)</option>
    </select>
    <div id="chat-box"></div>
    <p id="status" class="status">Initializing...</p>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <button id="speak-btn" disabled>🎤 Press & Speak English</button>

    <script type="module">
        import { pipeline } from './transformers.min.js';

        const chatBox = document.getElementById('chat-box');
        const statusDiv = document.getElementById('status');
        const speakBtn = document.getElementById('speak-btn');
        const modelSelect = document.getElementById('model-select');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');

        let generator = null;
        let isListening = false;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        const synth = window.speechSynthesis;

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            synth.speak(utterance);
        }

        // فعال‌سازی صدا با یه جملهٔ خیلی کوتاه بی‌صدا
        function unlockAudio() {
            const u = new SpeechSynthesisUtterance('');
            u.volume = 0;
            u.rate = 1;
            synth.speak(u);
        }

        async function loadModel(modelName) {
            statusDiv.textContent = 'Loading model...';
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            speakBtn.disabled = true;

            try {
                generator = await pipeline('text-generation', modelName, {
                    progress_callback: (progress) => {
                        if (progress.status === 'progress') {
                            const percent = Math.round((progress.loaded / progress.total) * 100);
                            progressFill.style.width = percent + '%';
                            statusDiv.textContent = `Downloading: ${percent}%`;
                        }
                    }
                });
                statusDiv.textContent = 'Ready! Tap the button and speak.';
                progressBar.style.display = 'none';
                speakBtn.disabled = false;
            } catch (err) {
                statusDiv.textContent = 'Error: ' + err.message;
                progressBar.style.display = 'none';
                console.error(err);
            }
        }

        loadModel(modelSelect.value);

        modelSelect.addEventListener('change', () => {
            loadModel(modelSelect.value);
        });

        // دکمه ضبط صدا
        speakBtn.addEventListener('click', () => {
            if (isListening) return;
            unlockAudio(); // قفل صدا رو باز کن
            recognition.start();
            isListening = true;
            speakBtn.textContent = '🎧 Listening...';
            statusDiv.textContent = 'Speak now...';
        });

        recognition.addEventListener('result', async (event) => {
            const transcript = event.results[0][0].transcript;
            addMessage('You', transcript, 'user-msg');
            statusDiv.textContent = 'Thinking...';
            recognition.stop();
            isListening = false;
            speakBtn.textContent = '🎤 Press & Speak English';

            if (!generator) {
                addMessage('System', 'Model not loaded.', 'ai-msg');
                return;
            }

            const prompt = `<|system|>
You are a friendly English tutor. The user is a beginner. Speak simply, correct mistakes gently, encourage. Always reply in English.</s>
<|user|>
${transcript}</s>
<|assistant|>`;

            try {
                const output = await generator(prompt, {
                    max_new_tokens: 80,
                    temperature: 0.7,
                    do_sample: true,
                });
                const generatedText = output[0].generated_text;
                const assistantReply = generatedText.split('<|assistant|>').pop().trim();
                addMessage('Tutor', assistantReply, 'ai-msg', true); // پخش خودکار
                statusDiv.textContent = 'Ready.';
            } catch (error) {
                addMessage('System', 'Sorry, error.', 'ai-msg');
                statusDiv.textContent = 'Error. Refresh.';
            }
        });

        recognition.addEventListener('error', (event) => {
            addMessage('System', 'Mic error: ' + event.error, 'ai-msg');
            isListening = false;
            speakBtn.textContent = '🎤 Press & Speak English';
        });

        function addMessage(sender, text, cssClass, autoSpeak = false) {
            const p = document.createElement('p');
            p.className = cssClass;
            p.innerHTML = `${sender}: ${text} `;

            // دکمهٔ گوش دادن برای جواب‌های معلم
            if (sender === 'Tutor') {
                const btn = document.createElement('button');
                btn.className = 'listen-btn';
                btn.textContent = '🔊 Listen';
                btn.addEventListener('click', () => speak(text));
                p.appendChild(btn);
            }

            chatBox.appendChild(p);
            chatBox.scrollTop = chatBox.scrollHeight;

            // تلاش برای پخش خودکار
            if (autoSpeak && sender === 'Tutor') {
                speak(text);
            }
        }
    </script>
</body>
</html>
