<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇬🇧 English Tutor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: #f0f8ff;
        }
        h1 { text-align: center; color: #1e3a8a; }
        #model-select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        #chat-box {
            background: white;
            border-radius: 10px;
            padding: 15px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }
        .user-msg { color: #2563eb; }
        .ai-msg { color: #16a34a; }
        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        button:disabled {
            background: #9ca3af;
        }
        .status { color: #6b7280; text-align: center; }
    </style>
</head>
<body>
    <h1>🇬🇧 English Tutor</h1>
    <select id="model-select">
        <option value="Xenova/TinyLlama-1.1B-Chat-v1.0">TinyLlama (fast, 600MB)</option>
        <option value="Xenova/gemma-2-2b-it" disabled>Gemma 2B (coming soon)</option>
    </select>
    <div id="chat-box"></div>
    <p id="status" class="status">Loading model... please wait.</p>
    <button id="speak-btn" disabled>🎤 Press & Speak English</button>

    <script type="module">
        // کتابخونه Transformers.js رو از اینترنت بارگیری می‌کنیم (فقط دفعه اول)
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        const chatBox = document.getElementById('chat-box');
        const statusDiv = document.getElementById('status');
        const speakBtn = document.getElementById('speak-btn');
        const modelSelect = document.getElementById('model-select');

        let generator = null;
        let isListening = false;

        // آماده‌سازی تشخیص گفتار
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        // متن به صدا
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            synth.speak(utterance);
        }

        // بارگذاری مدل بر اساس انتخاب
        async function loadModel(modelName) {
            statusDiv.textContent = 'Loading model... (this might take a minute the first time)';
            speakBtn.disabled = true;
            generator = await pipeline('text-generation', modelName);
            statusDiv.textContent = 'Ready! Tap the button and speak.';
            speakBtn.disabled = false;
        }

        // در شروع، مدل پیش‌فرض را بارگذاری کن
        loadModel(modelSelect.value);

        modelSelect.addEventListener('change', () => {
            loadModel(modelSelect.value);
        });

        // دکمه ضبط صدا
        speakBtn.addEventListener('click', () => {
            if (isListening) return;
            recognition.start();
            isListening = true;
            speakBtn.textContent = '🎧 Listening...';
            statusDiv.textContent = 'Speak now...';
        });

        recognition.addEventListener('result', async (event) => {
            const transcript = event.results[0][0].transcript;
            addMessage('You', transcript, 'user-msg');
            statusDiv.textContent = 'Thinking...';
            recognition.stop();
            isListening = false;
            speakBtn.textContent = '🎤 Press & Speak English';

            if (!generator) {
                addMessage('System', 'Model not loaded yet.', 'ai-msg');
                return;
            }

            // پرامپت معلم انگلیسی
            const prompt = `<|system|>
You are a friendly English tutor and language partner.
The user is a beginner. Speak simply, correct mistakes gently, encourage them. Always reply in English.</s>
<|user|>
${transcript}</s>
<|assistant|>`;

            try {
                const output = await generator(prompt, {
                    max_new_tokens: 100,
                    temperature: 0.7,
                    do_sample: true,
                });
                const generatedText = output[0].generated_text;
                // فقط بخش پاسخ دستیار رو دربیار
                const assistantReply = generatedText.split('<|assistant|>').pop().trim();
                addMessage('Tutor', assistantReply, 'ai-msg');
                speak(assistantReply);
                statusDiv.textContent = 'Ready.';
            } catch (error) {
                addMessage('System', 'Sorry, an error occurred.', 'ai-msg');
                statusDiv.textContent = 'Error. Please refresh.';
            }
        });

        recognition.addEventListener('error', (event) => {
            addMessage('System', 'Microphone error: ' + event.error, 'ai-msg');
            isListening = false;
            speakBtn.textContent = '🎤 Press & Speak English';
        });

        function addMessage(sender, text, cssClass) {
            const p = document.createElement('p');
            p.className = cssClass;
            p.textContent = `${sender}: ${text}`;
            chatBox.appendChild(p);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
