<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇬🇧 English Partner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: #f0f8ff;
        }
        h1 { text-align: center; color: #1e3a8a; }
        #chat-box {
            background: white;
            border-radius: 10px;
            padding: 15px;
            min-height: 300px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }
        .user-msg { color: #2563eb; margin-bottom: 10px; }
        .tutor-msg { color: #16a34a; margin-bottom: 10px; }
        .listen-btn {
            font-size: 14px;
            padding: 5px 10px;
            margin-left: 10px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .error-msg { color: #dc2626; background: #fee2e2; padding: 10px; border-radius: 5px; }
        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        button:disabled {
            background: #9ca3af;
        }
        .status { color: #6b7280; text-align: center; margin: 10px 0; }
        #progress-bar {
            width: 100%;
            height: 10px;
            background: #e5e7eb;
            border-radius: 5px;
            margin-top: 5px;
            display: none;
        }
        #progress-fill {
            height: 100%;
            background: #2563eb;
            border-radius: 5px;
            width: 0%;
        }
    </style>
</head>
<body>
    <h1>🇬🇧 English Partner</h1>
    <div id="chat-box">
        <p class="tutor-msg">Hello! I'm your English partner. Press the button and talk to me. 😊</p>
    </div>
    <p id="status" class="status">Loading model...</p>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <button id="speak-btn" disabled>🎤 Press & Speak English</button>

    <script type="module">
        import { pipeline } from './transformers.min.js';

        const chatBox = document.getElementById('chat-box');
        const statusDiv = document.getElementById('status');
        const speakBtn = document.getElementById('speak-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');

        let generator = null;
        let isListening = false;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        const synth = window.speechSynthesis;

        function speak(text) {
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            u.rate = 0.85;
            synth.speak(u);
        }

        function unlockAudio() {
            const u = new SpeechSynthesisUtterance('');
            u.volume = 0;
            synth.speak(u);
        }

        function addMessage(sender, text, autoSpeak = false) {
            const p = document.createElement('p');
            p.className = sender === 'You' ? 'user-msg' : 'tutor-msg';
            p.innerHTML = `<strong>${sender}:</strong> ${text} `;

            if (sender === 'Tutor') {
                const btn = document.createElement('button');
                btn.className = 'listen-btn';
                btn.textContent = '🔊 Listen';
                btn.addEventListener('click', () => speak(text));
                p.appendChild(btn);
            }

            chatBox.appendChild(p);
            chatBox.scrollTop = chatBox.scrollHeight;

            if (autoSpeak && sender === 'Tutor') {
                speak(text);
            }
        }

        async function loadModel() {
            const modelName = 'Xenova/opt-125m';
            statusDiv.textContent = 'Loading OPT-125M... (~250MB)';
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            speakBtn.disabled = true;

            try {
                generator = await pipeline('text-generation', modelName, {
                    progress_callback: (progress) => {
                        if (progress.status === 'progress') {
                            const percent = Math.round((progress.loaded / progress.total) * 100);
                            progressFill.style.width = percent + '%';
                            statusDiv.textContent = `Downloading: ${percent}%`;
                        }
                    }
                });
                statusDiv.textContent = 'Ready! Press the button and speak.';
                progressBar.style.display = 'none';
                speakBtn.disabled = false;
            } catch (err) {
                progressBar.style.display = 'none';
                statusDiv.textContent = 'Failed to load model.';
                console.error(err);
                addMessage('System', 'Could not load OPT model: ' + err.message, 'error-msg');
                addMessage('System', 'This may be due to Safari memory limits. Try clearing Safari data and reloading.', 'error-msg');
                addMessage('System', 'If it keeps failing, the 15MB TinyStories model is available as a fallback.', 'error-msg');
            }
        }

        loadModel();

        speakBtn.addEventListener('click', () => {
            if (isListening || !generator) return;
            unlockAudio();
            recognition.start();
            isListening = true;
            speakBtn.textContent = '🎧 Listening...';
            statusDiv.textContent = 'Speak now...';
        });

        recognition.addEventListener('result', async (event) => {
            const userText = event.results[0][0].transcript;
            addMessage('You', userText);
            statusDiv.textContent = 'Tutor is thinking...';
            recognition.stop();
            isListening = false;
            speakBtn.textContent = '🎤 Press & Speak English';

            // پرامپت مخصوص OPT (از فرمت ساده استفاده می‌کنیم چون OPT دستورالعمل‌های خاصی ندارد)
            const prompt = `You are a kind English tutor. The user is a beginner. Reply in simple English, correct mistakes gently.

User: ${userText}
Tutor:`;

            try {
                const output = await generator(prompt, {
                    max_new_tokens: 50,
                    temperature: 0.6,
                    do_sample: true,
                    repetition_penalty: 1.2,
                });
                const generated = output[0].generated_text;
                // استخراج پاسخ بعد از "Tutor:"
                const reply = generated.split('Tutor:').pop().trim();
                addMessage('Tutor', reply, true);
                statusDiv.textContent = 'Ready.';
            } catch (error) {
                addMessage('System', 'Sorry, I had a problem. Please try again.', 'tutor-msg');
                statusDiv.textContent = 'Error.';
            }
        });

        recognition.addEventListener('error', (event) => {
            addMessage('System', 'Microphone error: ' + event.error, 'tutor-msg');
            isListening = false;
            speakBtn.textContent = '🎤 Press & Speak English';
        });

        document.addEventListener('click', unlockAudio, { once: true });
    </script>
</body>
</html>
